<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .source-box { animation: fadeIn 0.6s ease-out both; }
    .arrow { stroke-dasharray: 200; animation: drawLine 0.8s ease-out both; }
    .vendor-box { animation: fadeIn 0.5s ease-out both; }
    .vendor-1 { animation-delay: 0.3s; }
    .vendor-2 { animation-delay: 0.45s; }
    .vendor-3 { animation-delay: 0.6s; }
    .vendor-4 { animation-delay: 0.75s; }
    .vendor-5 { animation-delay: 0.9s; }
    .arrow-1 { animation-delay: 0.2s; }
    .arrow-2 { animation-delay: 0.35s; }
    .arrow-3 { animation-delay: 0.5s; }
    .arrow-4 { animation-delay: 0.65s; }
    .arrow-5 { animation-delay: 0.8s; }
    .engine-box { animation: fadeIn 0.4s ease-out 0.1s both; }
    .engine-pulse { animation: pulse 2.5s ease-in-out infinite 1.2s; }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    .mono { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; }
  </style>

  <defs>
    <linearGradient id="srcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#c4643f"/>
    </linearGradient>
    <linearGradient id="cursorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171717"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="windsurfGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="copilotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#1a7f37"/>
    </linearGradient>
    <linearGradient id="codexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#0d8a6a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f59e0b" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="#fafafa"/>

  <!-- Source: skill.md -->
  <g class="source-box" filter="url(#shadow)">
    <rect x="30" y="140" width="180" height="140" rx="10" fill="url(#srcGrad)"/>
    <text x="120" y="175" text-anchor="middle" fill="white" font-size="13" font-weight="600">Universal Format</text>
    <rect x="48" y="190" width="144" height="72" rx="6" fill="rgba(255,255,255,0.15)"/>
    <text x="62" y="210" fill="rgba(255,255,255,0.9)" font-size="10" class="mono">---</text>
    <text x="62" y="224" fill="rgba(255,255,255,0.9)" font-size="10" class="mono">name: my-skill</text>
    <text x="62" y="238" fill="rgba(255,255,255,0.9)" font-size="10" class="mono">activation: auto</text>
    <text x="62" y="252" fill="rgba(255,255,255,0.9)" font-size="10" class="mono">---</text>
  </g>

  <!-- Smith -->
  <g class="engine-box" filter="url(#glow)">
    <rect class="engine-pulse" x="280" y="168" width="180" height="84" rx="10" fill="url(#engineGrad)"/>
    <text x="370" y="200" text-anchor="middle" fill="white" font-size="14" font-weight="700">Skill</text>
    <text x="370" y="220" text-anchor="middle" fill="white" font-size="14" font-weight="700">Smith</text>
    <text x="370" y="240" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10" class="mono">npx skillsmith add -a ...</text>
  </g>

  <!-- Arrows: source → engine -->
  <line x1="210" y1="210" x2="278" y2="210" stroke="#a78bfa" stroke-width="2.5" class="arrow" stroke-linecap="round"/>
  <polygon points="275,205 285,210 275,215" fill="#a78bfa"/>

  <!-- Vendor boxes -->
  <!-- Claude -->
  <g class="vendor-box vendor-1" filter="url(#shadow)">
    <rect x="560" y="18" width="210" height="60" rx="8" fill="url(#claudeGrad)"/>
    <text x="590" y="43" fill="white" font-size="13" font-weight="600">Claude Code</text>
    <text x="590" y="60" fill="rgba(255,255,255,0.8)" font-size="10" class="mono">.claude/skills/*/SKILL.md</text>
  </g>

  <!-- Cursor -->
  <g class="vendor-box vendor-2" filter="url(#shadow)">
    <rect x="560" y="98" width="210" height="60" rx="8" fill="url(#cursorGrad)"/>
    <text x="590" y="123" fill="white" font-size="13" font-weight="600">Cursor</text>
    <text x="590" y="140" fill="rgba(255,255,255,0.8)" font-size="10" class="mono">.cursor/rules/*/RULE.md</text>
  </g>

  <!-- Windsurf -->
  <g class="vendor-box vendor-3" filter="url(#shadow)">
    <rect x="560" y="178" width="210" height="60" rx="8" fill="url(#windsurfGrad)"/>
    <text x="590" y="203" fill="white" font-size="13" font-weight="600">Windsurf</text>
    <text x="590" y="220" fill="rgba(255,255,255,0.8)" font-size="10" class="mono">.windsurf/rules/*.md</text>
  </g>

  <!-- Copilot -->
  <g class="vendor-box vendor-4" filter="url(#shadow)">
    <rect x="560" y="258" width="210" height="60" rx="8" fill="url(#copilotGrad)"/>
    <text x="590" y="283" fill="white" font-size="13" font-weight="600">GitHub Copilot</text>
    <text x="590" y="300" fill="rgba(255,255,255,0.8)" font-size="10" class="mono">.github/instructions/*.md</text>
  </g>

  <!-- Codex -->
  <g class="vendor-box vendor-5" filter="url(#shadow)">
    <rect x="560" y="338" width="210" height="60" rx="8" fill="url(#codexGrad)"/>
    <text x="590" y="363" fill="white" font-size="13" font-weight="600">Codex / AGENTS.md</text>
    <text x="590" y="380" fill="rgba(255,255,255,0.8)" font-size="10" class="mono">AGENTS.md</text>
  </g>

  <!-- Arrows: engine → vendors -->
  <path d="M460 195 Q500 195 520 48 L558 48" stroke="#d97757" stroke-width="2" fill="none" class="arrow arrow-1" stroke-linecap="round"/>
  <polygon points="555,43 565,48 555,53" fill="#d97757"/>

  <path d="M460 200 Q510 200 530 128 L558 128" stroke="#555" stroke-width="2" fill="none" class="arrow arrow-2" stroke-linecap="round"/>
  <polygon points="555,123 565,128 555,133" fill="#555"/>

  <line x1="460" y1="210" x2="558" y2="208" stroke="#06b6d4" stroke-width="2" class="arrow arrow-3" stroke-linecap="round"/>
  <polygon points="555,203 565,208 555,213" fill="#06b6d4"/>

  <path d="M460 220 Q510 220 530 288 L558 288" stroke="#238636" stroke-width="2" fill="none" class="arrow arrow-4" stroke-linecap="round"/>
  <polygon points="555,283 565,288 555,293" fill="#238636"/>

  <path d="M460 225 Q500 225 520 368 L558 368" stroke="#10a37f" stroke-width="2" fill="none" class="arrow arrow-5" stroke-linecap="round"/>
  <polygon points="555,363 565,368 555,373" fill="#10a37f"/>
</svg>
